<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Traccker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen">
    <div class="max-w-6xl mx-auto p-4">
        <header>
            <h2 class="text-[#002C5C] text-2xl font-bold md:text-3xl mb-4">Job Application Tracker</h2>
            <div class="grid md:grid-cols-3 grid-cols-1 gap-4 mb-8">
                <div class="bg-white rounded-2xl shadow p-4">
                    <h2 class="text-[#323B49] font-medium">Total</h2>
                    <p id="totalCount" class="text-2xl text-[#002C5C] font-bold">0</p>
                </div>
                <div class="bg-white rounded-2xl shadow p-4">
                    <h2 class="text-[#323B49] font-medium">Interview</h2>
                    <p id="interviewCount" class="text-2xl text-[#10B981] font-bold">0</p>
                </div>
                <div class="bg-white rounded-2xl shadow p-4">
                    <h2 class="text-[#323B49] font-medium">Rejected</h2>
                    <p id="RejectedCount" class="text-2xl text-[#EF4444] font-bold">0</p>
                </div>
            </div>
        </header>
        <main>
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-xl font-semibold text-[#111827]">Available Jobs</h2>
                <p id="tabCount" class="text-sm  text-[#64748B]">0 of 0 jobs</p>
            </div>

            <!-- tabs -->
            <div class="flex gap-2 mb-6 flex-wrap">
                <button data-tab="all" class="tab-btn bg-[#3B82F6] text-white px-4 py-2 rounded-lg">All</button>
                <button data-tab="interview" class="tab-btn bg-gray-200 px-4 py-2 rounded-lg">Interview</button>
                <button data-tab="rejected" class="tab-btn bg-gray-200 px-4 py-2 rounded-lg">Rejected</button>
            </div>

            <div id="jobsContainer" class="space-y-4"></div>

            <div id="emptyState" class="hidden text-center py-16">
                <div class="text-5xl mb-3"><img class="w-[70px] mx-auto" src="./images/jobs.png" alt=""></div>
                <h3 class="text-lg font-semibold text-[#002C5C]">No jobs Available</h3>
                <p class=" text-sm text-[#64748B]">There are no jobs in this category yet.</p>
            </div>
        </main>
    </div>
    <script src="script/script.js"></script>
</body>

</html>
